name: "Build Packages"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31.11.0

      - name: Build Packages
        run: |
          mkdir -p nix-archive

          nix build .#plasma-final
          nix copy --to file://$PWD/nix-archive $(readlink result)
          nix build .#plasma-prev
          nix copy --to file://$PWD/nix-archive $(readlink result)

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: nix-packages
          path: ./nix-archive

